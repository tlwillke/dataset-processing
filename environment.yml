# To configure PyCharm manually if not prompted automatically:
# 1. Go to Settings (Ctrl+Alt+S or Cmd+,) > Project: [Name] > Python Interpreter.
# 2. Click Add Interpreter > Add Local Interpreter...
# 3. Select Conda Environment on the left.
# 4. Choose "Create new environment" (or "Generate new").
# 5. Select the option "Create from environment.yml".
# 6. Point it to this file in your project folder and click OK.

